<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доставка Еды</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1 class="logo">Eats <span>Red</span></h1>
            <nav id="categories">
                <!-- Категории появятся здесь автоматически -->
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="menu-grid" class="menu-grid">
            <!-- Блюда загрузятся сюда из таблицы -->
            <p>Загрузка вкусняшек...</p>
        </div>
    </main>

    <!-- Кнопка корзины (появляется, когда что-то выбрано) -->
    <div id="cart-button" onclick="toggleCart()">
        <span>Корзина</span>
        <span id="cart-count">0</span>
    </div>

    <!-- Окно корзины -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Ваш заказ</h2>
                <span class="close" onclick="toggleCart()">&times;</span>
            </div>
            <div id="cart-items">
                <!-- Выбранные блюда -->
            </div>
            <div class="cart-total">
                Итого: <span id="total-amount">0</span> ₸
            </div>
            
            <form id="order-form">
                <h3>Данные для доставки</h3>
                <input type="text" id="user-name" placeholder="Ваше имя" required>
                <input type="tel" id="user-phone" placeholder="Ваш телефон" required>
                <input type="text" id="user-address" placeholder="Адрес доставки" required>
                <button type="submit" class="btn-order">Оформить в WhatsApp</button>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
