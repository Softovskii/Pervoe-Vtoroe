<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Доставка еды</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="brand-row">
        <h1 class="logo">Быстро<span>Еда</span></h1>
      </div>
      <nav id="categories" class="categories"></nav>
    </div>
  </header>

  <main class="container">
    <section id="menu-grid" class="menu-grid">
      <p class="status">Загружаем меню...</p>
    </section>
  </main>

  <button id="cart-button" class="cart-button" type="button">
    <span>Корзина</span>
    <span id="cart-count" class="cart-count">0</span>
  </button>

  <div id="cart-modal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Ваш заказ</h2>
        <button id="close-modal" class="close" type="button" aria-label="Закрыть">×</button>
      </div>

      <div id="cart-items" class="cart-items"></div>
      <div class="cart-total">Итого: <span id="total-amount">0</span> ₸</div>

      <form id="order-form" class="order-form">
        <h3>Данные для доставки</h3>
        <input id="user-name" type="text" placeholder="Ваше имя" required />
        <input id="user-phone" type="tel" placeholder="Ваш телефон" required />
        <input id="user-address" type="text" placeholder="Адрес доставки" required />
        <button class="btn-order" type="submit">Оформить в WhatsApp</button>
      </form>
    </div>
  </div>

<script src="config.js?v=2"></script>
<script src="script.js?v=2"></script>
</body>
</html>
